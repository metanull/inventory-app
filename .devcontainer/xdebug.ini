; Xdebug — step debugging for VS Code (PHP Debug extension)
; Mode is set to "debug" only; profiling/coverage can be layered via env override.
xdebug.mode=debug
xdebug.start_with_request=yes
xdebug.client_host=host.docker.internal
xdebug.client_port=9003
; Suppress verbose internal logging in the container log
xdebug.log_level=0
