name: Mandatory Checks

permissions:
  contents: read
  packages: read

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

  workflow_dispatch:

concurrency:
  group: ci-mandatory-${{ github.ref }}
  cancel-in-progress: true

jobs:

  audit-composer:
    name: Audit - Composer (PHP)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: "Setup > Image > Install php"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: fileinfo, zip, sqlite3, pdo_sqlite, gd, exif

      - name: "Check > Composer > Validate composer.json"
        run: |
          composer validate --with-dependencies --strict

      - name: "Setup > Composer > Install Dependencies"
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: "Check > Composer > Audit Vulnerabilities"
        env:
          ALLOWED_COMPOSER_AUDIT_PACKAGE: phpunit/phpunit
          ALLOWED_COMPOSER_AUDIT_ADVISORY: PKSA-5jz8-6tcw-pbk4
        run: |
          composer audit --format=json > composer-audit.json || true

          python - <<'PY'
          import json
          import os
          import sys

          with open('composer-audit.json', encoding='utf-8') as handle:
            report = json.load(handle)

          allowed_package = os.environ['ALLOWED_COMPOSER_AUDIT_PACKAGE']
          allowed_advisory = os.environ['ALLOWED_COMPOSER_AUDIT_ADVISORY']

          remaining = {}
          ignored = {}

          for package, advisories in report.get('advisories', {}).items():
            for advisory in advisories:
              if package == allowed_package and advisory.get('advisoryId') == allowed_advisory:
                ignored.setdefault(package, []).append(advisory)
              else:
                remaining.setdefault(package, []).append(advisory)

          abandoned = report.get('abandoned', [])

          if ignored:
            print('Ignoring allowed Composer advisory in CI:')
            print(json.dumps(ignored, indent=2))

          if remaining or abandoned:
            print('Composer audit failed after applying CI allowlist.')
            print(json.dumps({'advisories': remaining, 'abandoned': abandoned}, indent=2))
            sys.exit(1)

          print('Composer audit passed after applying CI allowlist.')
          PY

  audit-npm-root:
    name: Audit - npm (Root)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: "Setup > Image > Install Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: "lts/Krypton"

      - name: "Setup > node > Enable Corepack"
        run: |
          corepack enable

      - name: "Setup > npm > Install Dependencies"
        run: |
          npm ci --no-audit --no-fund

      - name: "Check > npm > Audit Vulnerabilities"
        run: |
          npm audit --audit-level moderate

  audit-npm-importer:
    name: Audit - npm (Importer)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: "Setup > Image > Install Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: "lts/Krypton"

      - name: "Setup > node > Enable Corepack"
        run: |
          corepack enable

      - name: "Setup > npm > Install Dependencies (Importer)"
        working-directory: scripts/importer
        run: |
          npm ci --no-audit --no-fund

      - name: "Check > npm > Audit Vulnerabilities (Importer)"
        working-directory: scripts/importer
        run: |
          npm audit --audit-level moderate

  audit-npm-spa:
    name: Audit - npm (SPA)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: "Setup > Image > Install Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: "lts/Krypton"
          registry-url: https://npm.pkg.github.com/

      - name: "Setup > node > Enable Corepack"
        run: |
          corepack enable

      - name: "Setup > npm > Install Dependencies (SPA)"
        working-directory: spa
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci --no-audit --no-fund

      - name: "Check > npm > Audit Vulnerabilities (SPA)"
        working-directory: spa
        run: |
          npm audit --audit-level moderate

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [audit-composer, audit-npm-root, audit-npm-importer, audit-npm-spa]
    if: always()

    steps:
      - name: Check all mandatory checks passed
        run: |
          composerResult="${{ needs.audit-composer.result }}"
          npmRootResult="${{ needs.audit-npm-root.result }}"
          npmImporterResult="${{ needs.audit-npm-importer.result }}"
          npmSpaResult="${{ needs.audit-npm-spa.result }}"

          if [ "$composerResult" != "success" ] || \
             [ "$npmRootResult" != "success" ] || \
             [ "$npmImporterResult" != "success" ] || \
             [ "$npmSpaResult" != "success" ]; then
            echo "One or more mandatory checks failed"
            echo "Composer Audit:       $composerResult"
            echo "npm Audit (Root):     $npmRootResult"
            echo "npm Audit (Importer): $npmImporterResult"
            echo "npm Audit (SPA):      $npmSpaResult"
            exit 1
          fi
          echo "All mandatory checks passed"
